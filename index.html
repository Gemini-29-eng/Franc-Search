<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Franc</title>

<style>
/* ===== BASE ===== */
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: radial-gradient(circle at top, #0f172a, #050814);
  color: white;
  overflow: hidden;
}

/* ===== HOME ===== */
.home {
  height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
}

/* LOGO */
.logo {
  font-size: 90px;
  font-weight: bold;
  letter-spacing: 3px;
  background: linear-gradient(90deg, #3b82f6, #60a5fa, #22c55e);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  animation: glow 3s infinite alternate;
}

@keyframes glow {
  from { filter: drop-shadow(0 0 10px #3b82f6); }
  to { filter: drop-shadow(0 0 25px #22c55e); }
}

/* SUBTITLE */
.subtitle {
  color: #94a3b8;
  margin-top: 10px;
  margin-bottom: 25px;
}

/* SEARCH BOX */
.search-box {
  display: flex;
  gap: 10px;
  background: rgba(255,255,255,0.05);
  padding: 10px;
  border-radius: 50px;
  backdrop-filter: blur(10px);
  border: 1px solid rgba(255,255,255,0.1);
}

/* INPUT */
.search-box input {
  width: 380px;
  padding: 12px;
  border: none;
  outline: none;
  background: transparent;
  color: white;
  font-size: 16px;
}

/* BUTTON */
.search-box button {
  padding: 12px 20px;
  border-radius: 40px;
  border: none;
  background: linear-gradient(90deg, #3b82f6, #22c55e);
  color: white;
  cursor: pointer;
  transition: 0.3s;
}

.search-box button:hover {
  transform: scale(1.05);
  opacity: 0.9;
}

/* FLOATING SHAPES */
.circle {
  position: absolute;
  width: 200px;
  height: 200px;
  background: rgba(59,130,246,0.2);
  border-radius: 50%;
  filter: blur(50px);
  top: 10%;
  left: 15%;
}

.circle2 {
  position: absolute;
  width: 250px;
  height: 250px;
  background: rgba(34,197,94,0.2);
  border-radius: 50%;
  filter: blur(60px);
  bottom: 10%;
  right: 10%;
}
</style>
</head>

<body>

<div class="circle"></div>
<div class="circle2"></div>

<div class="home">

  <h1 class="logo">Franc</h1>
  <p class="subtitle">Le moteur de recherche de Franc Suisse</p>

  <div class="search-box">
    <input type="text" placeholder="Rechercher sur Franc...">
    <button>Rechercher</button>
  </div>

</div>

</body>
</html>
