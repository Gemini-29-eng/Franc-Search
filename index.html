<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Franc - Moteur de Recherche & Actu</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #f8fafc;
            --card-bg: #ffffff;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --primary: #3b82f6;
            --primary-hover: #2563eb;
            --primary-light: #eff6ff;
            --shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
            --transition: cubic-bezier(0.4, 0, 0.2, 1) 0.3s;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
        }

        /* Barre supérieure / Bouton Se Connecter */
        .top-bar {
            width: 100%;
            display: flex;
            justify-content: flex-end;
            padding: 20px 40px;
            animation: fadeInDown 0.6s ease;
        }

        .login-btn {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 10px 22px;
            border-radius: 50px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            box-shadow: 0 4px 14px rgba(59, 130, 246, 0.3);
            transition: var(--transition);
        }

        .login-btn:hover {
            background-color: var(--primary-hover);
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(59, 130, 246, 0.4);
        }

        .login-btn:hover i {
            animation: pulse 0.5s infinite alternate;
        }

        /* En-tête / Logo */
        header {
            margin-top: 2vh;
            text-align: center;
            animation: fadeInDown 0.8s ease;
        }

        .logo {
            font-size: 3.5rem;
            font-weight: 600;
            letter-spacing: -1px;
            color: var(--text-main);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .logo span { color: var(--primary); }
        .logo i {
            font-size: 2.5rem;
            color: var(--primary);
            animation: float 3s ease-in-out infinite;
        }

        .tagline {
            color: var(--text-muted);
            font-size: 1rem;
            margin-top: 5px;
        }

        /* Barre de recherche */
        .search-container {
            width: 90%;
            max-width: 650px;
            margin-top: 35px;
            position: relative;
            animation: scaleUp 0.6s cubic-bezier(0.16, 1, 0.3, 1);
            z-index: 10;
        }

        .search-wrapper {
            display: flex;
            align-items: center;
            background: var(--card-bg);
            padding: 5px 15px;
            border-radius: 50px;
            box-shadow: var(--shadow);
            border: 2px solid transparent;
            transition: var(--transition);
        }

        .search-wrapper:focus-within {
            border-color: var(--primary);
            transform: translateY(-2px);
            box-shadow: 0 15px 35px rgba(59, 130, 246, 0.1);
        }

        .search-input {
            width: 100%;
            padding: 15px 10px;
            border: none;
            outline: none;
            font-size: 1.1rem;
            background: transparent;
            color: var(--text-main);
        }

        .search-btn {
            background: var(--primary);
            color: white;
            border: none;
            width: 48px;
            height: 48px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: var(--transition);
        }

        .search-btn:hover {
            background: var(--primary-hover);
            transform: scale(1.05);
        }

        /* Zone de résultats (Moteur de recherche) */
        .results-container {
            width: 90%;
            max-width: 750px;
            margin-top: 30px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .loader {
            display: none;
            text-align: center;
            font-size: 2rem;
            color: var(--primary);
            margin-top: 20px;
        }
        .loader i { animation: spin 1s linear infinite; }

        /* Section Actualités (Actu) */
        .news-section {
            width: 90%;
            max-width: 950px;
            margin: 60px 0;
            animation: fadeInUp 0.8s ease;
        }

        .news-section h2 {
            font-size: 1.8rem;
            margin-bottom: 25px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .news-section h2 i {
            color: #ef4444;
            animation: pulse 1s infinite alternate;
        }

        .news-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 25px;
        }

        .news-card {
            background: var(--card-bg);
            border-radius: 16px;
            overflow: hidden;
            box-shadow: var(--shadow);
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            flex-direction: column;
        }

        .news-card:hover {
            transform: translateY(-6px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.08);
        }

        .news-img-wrapper {
            width: 100%;
            height: 180px;
            overflow: hidden;
            position: relative;
            background-color: #e2e8f0; /* Fond de secours pendant le chargement */
        }

        .news-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: var(--transition);
        }

        .news-card:hover .news-img {
            transform: scale(1.06);
        }

        .news-content {
            padding: 20px;
            display: flex;
            flex-direction: column;
            flex-grow: 1;
        }

        .news-source {
            font-size: 0.8rem;
            text-transform: uppercase;
            font-weight: 700;
            color: var(--primary);
            letter-spacing: 0.5px;
            margin-bottom: 8px;
        }

        .news-title {
            font-size: 1.1rem;
            font-weight: 600;
            line-height: 1.4;
            margin-bottom: 10px;
            color: var(--text-main);
        }

        .news-desc {
            font-size: 0.9rem;
            color: var(--text-muted);
            line-height: 1.5;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        /* Fenêtre Modale (Article complet) */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(15, 23, 42, 0.4);
            backdrop-filter: blur(8px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.4s ease;
        }

        .modal.active {
            opacity: 1;
            pointer-events: auto;
        }

        .modal-content {
            background: var(--card-bg);
            width: 90%;
            max-width: 700px;
            max-height: 85vh;
            border-radius: 24px;
            overflow-y: auto;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            transform: scale(0.9) translateY(20px);
            transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            position: relative;
        }

        .modal.active .modal-content {
            transform: scale(1) translateY(0);
        }

        .modal-close {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.9);
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            transition: var(--transition);
            z-index: 11;
        }

        .modal-close:hover {
            transform: rotate(90deg);
            background: #ef4444;
            color: white;
        }

        .modal-img {
            width: 100%;
            height: 300px;
            object-fit: cover;
        }

        .modal-body {
            padding: 30px;
        }

        .modal-body h3 {
            font-size: 1.6rem;
            margin: 10px 0 15px 0;
            line-height: 1.3;
        }

        .modal-body p {
            color: #334155;
            line-height: 1.7;
            font-size: 1.05rem;
        }

        /* Search Results Style */
        .article-card {
            background: var(--card-bg);
            padding: 25px;
            border-radius: 16px;
            box-shadow: var(--shadow);
            border-left: 5px solid transparent;
            animation: slideIn 0.4s forwards ease;
        }
        .article-card:hover {
            transform: translateY(-3px);
            border-left-color: var(--primary);
        }

        /* Animations Keyframes */
        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes scaleUp {
            from { opacity: 0; transform: scale(0.96); }
            to { opacity: 1; transform: scale(1); }
        }
        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-6px) rotate(4deg); }
        }
        @keyframes spin { 100% { transform: rotate(360deg); } }
        @keyframes pulse {
            0% { transform: scale(1); }
            100% { transform: scale(1.1); }
        }
    </style>
</head>
<body>

    <div class="top-bar">
        <button class="login-btn" onclick="alert('Connexion en cours...')">
            <i class="fa-solid fa-user-astronaut"></i> Se connecter
        </button>
    </div>

    <header>
        <div class="logo">
            <i class="fa-solid fa-compass"></i> Franc<span>.</span>
        </div>
        <p class="tagline">L'information claire, rapide et essentielle.</p>
    </header>

    <div class="search-container">
        <form id="search-form" onsubmit="performSearch(event)">
            <div class="search-wrapper">
                <input type="text" id="search-query" class="search-input" placeholder="Que recherchez-vous aujourd'hui ?" required autocomplete="off">
                <button type="submit" class="search-btn" aria-label="Rechercher">
                    <i class="fa-solid fa-magnifying-glass"></i>
                </button>
            </div>
        </form>
    </div>

    <div id="loader" class="loader">
        <i class="fa-solid fa-circle-notch"></i>
    </div>

    <main class="results-container" id="results-container"></main>

    <section class="news-section" id="news-section">
        <h2><i class="fa-solid fa-fire-flame-curved"></i> À la une</h2>
        <div class="news-grid" id="news-grid">
            </div>
    </section>

    <div class="modal" id="news-modal" onclick="closeModal(event)">
        <div class="modal-content">
            <button class="modal-close" onclick="closeModal(event, true)"><i class="fa-solid fa-xmark"></i></button>
            <img src="" alt="Image Article" id="modal-img" class="modal-img">
            <div class="modal-body">
                <span class="news-source" id="modal-source"></span>
                <h3 id="modal-title"></h3>
                <p id="modal-text"></p>
            </div>
        </div>
    </div>

    <script>
        // Source d'images alternatives ultra-stables (Lorem Picsum)
        const articlesData = [
            {
                id: 1,
                source: "Franc Tech",
                title: "L'intelligence artificielle franchit un nouveau cap dans le secteur médical",
                desc: "Des chercheurs ont mis au point un modèle capable de prédire des pathologies complexes avec deux ans d'avance, ouvrant la voie à une médecine ultra-personnalisée.",
                content: "Des chercheurs ont mis au point un modèle capable de prédire des pathologies complexes avec deux ans d'avance, ouvrant la voie à une médecine ultra-personnalisée. Ce système analyse des millions de données cliniques en tâche de fond pour assister les médecins. Les premiers tests en milieu hospitalier montrent un taux de réussite sans précédent, promettant de transformer les parcours de soins dès l'année prochaine.",
                img: "https://picsum.photos/id/1014/600/400"
            },
            {
                id: 2,
                source: "Franc Planète",
                title: "Énergies de demain : la fusion nucléaire commerciale approche à grands pas",
                desc: "Une start-up européenne annonce une avancée majeure pour stabiliser le plasma à haute température, promettant une énergie propre et quasi-illimitée.",
                content: "Une start-up européenne annonce une avancée majeure pour stabiliser le plasma à haute température, promettant une énergie propre et quasi-illimitée. En parvenant à maintenir le confinement magnétique pendant une durée record, les ingénieurs posent la première pierre d'un réacteur de production viable. Les investisseurs affluent, qualifiant cet événement de tournant historique du siècle.",
                img: "https://picsum.photos/id/1041/600/400"
            },
            {
                id: 3,
                source: "Franc Culture",
                title: "Exploration spatiale : de mystérieuses structures découvertes sous la surface de Mars",
                desc: "Les derniers relevés radar d'un rover ont mis en évidence d'immenses cavités géométriques complexes enfouies sous la glace des pôles martiens.",
                content: "Les derniers relevés radar d'un rover ont mis en évidence d'immenses cavités géométriques complexes enfouies sous la glace des pôles martiens. Les géologues débattent encore de leur origine : s'agit-il de formations volcaniques uniques ou de vestiges d'un passé hydrologique tumultueux ? Une mission de forage automatisée est déjà en cours d'étude pour percer ce mystère.",
                img: "https://picsum.photos/id/1021/600/400"
            }
        ];

        // Générer les actus au chargement
        function loadNews() {
            const grid = document.getElementById('news-grid');
            articlesData.forEach(art => {
                const card = document.createElement('div');
                card.className = 'news-card';
                card.onclick = () => openModal(art);
                card.innerHTML = `
                    <div class="news-img-wrapper">
                        <img src="${art.img}" alt="Illustration" class="news-img">
                    </div>
                    <div class="news-content">
                        <span class="news-source">${art.source}</span>
                        <h3 class="news-title">${art.title}</h3>
                        <p class="news-desc">${art.desc}</p>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        // Gestion de la Modale (Article complet)
        function openModal(article) {
            document.getElementById('modal-img').src = article.img;
            document.getElementById('modal-source').innerText = article.source;
            document.getElementById('modal-title').innerText = article.title;
            document.getElementById('modal-text').innerText = article.content;
            document.getElementById('news-modal').classList.add('active');
        }

        // Correction ici : la fonction gère correctement le bouton croix ainsi que le clic à côté
        function closeModal(event, force = false) {
            if (force || event.target.id === 'news-modal') {
                document.getElementById('news-modal').classList.remove('active');
            }
        }

        // Fonction Moteur de recherche (Wikipédia)
        async function performSearch(event) {
            event.preventDefault();
            const query = document.getElementById('search-query').value.trim();
            const resultsContainer = document.getElementById('results-container');
            const loader = document.getElementById('loader');
            const newsSection = document.getElementById('news-section');

            if (!query) return;

            resultsContainer.innerHTML = '';
            loader.style.display = 'block';
            newsSection.style.display = 'none'; 

            const url = `https://fr.wikipedia.org/w/api.php?action=query&list=search&prop=info&inprop=url&utf8=&format=json&origin=*&srlimit=4&srsearch=${encodeURIComponent(query)}`;

            try {
                const response = await fetch(url);
                const data = await response.json();
                loader.style.display = 'none';

                if (data.query.search.length === 0) {
                    resultsContainer.innerHTML = `<div class="article-card"><p>Aucun résultat pour "${query}".</p></div>`;
                    return;
                }

                data.query.search.forEach(article => {
                    const articleUrl = `https://fr.wikipedia.org/?curid=${article.pageid}`;
                    const cleanSnippet = article.snippet.replace(/<\/?[^>]+(>|$)/g, "");
                    
                    const card = document.createElement('article');
                    card.className = 'article-card';
                    card.style.marginBottom = "15px";
                    card.innerHTML = `
                        <h3 class="news-title"><a href="${articleUrl}" target="_blank" style="text-decoration:none; color:var(--text-main);">${article.title}</a></h3>
                        <p class="news-desc" style="-webkit-line-clamp: unset;">${cleanSnippet}...</p>
                    `;
                    resultsContainer.appendChild(card);
                });
            } catch (error) {
                loader.style.display = 'none';
                resultsContainer.innerHTML = `<div class="article-card" style="color:red;"><p>Erreur réseau.</p></div>`;
            }
        }

        // Initialisation
        window.onload = loadNews;
    </script>
</body>
</html>
