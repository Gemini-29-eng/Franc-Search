<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Franc</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0b1220;
      color: white;
    }

    /* HOME */
    .home {
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }

    .logo {
      font-size: 80px;
      margin: 0;
      letter-spacing: 2px;
    }

    .subtitle {
      color: #94a3b8;
      margin-bottom: 20px;
    }

    .hint {
      color: #64748b;
      margin-top: 15px;
      font-size: 13px;
    }

    .search-box {
      display: flex;
      gap: 10px;
    }

    .search-box input {
      width: 360px;
      padding: 14px;
      border-radius: 30px;
      border: none;
      outline: none;
      font-size: 15px;
    }

    .search-box button {
      padding: 14px 20px;
      border-radius: 30px;
      border: none;
      background: #3b82f6;
      color: white;
      cursor: pointer;
      transition: 0.3s;
    }

    .search-box button:hover {
      background: #2563eb;
      transform: scale(1.05);
    }

    /* RESULTS */
    .results {
      display: none;
      padding: 40px;
      max-width: 900px;
      margin: auto;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }

    .backBtn {
      padding: 10px 15px;
      border: none;
      border-radius: 10px;
      background: #334155;
      color: white;
      cursor: pointer;
    }

    .backBtn:hover {
      background: #475569;
    }

    .query {
      color: #94a3b8;
      margin-bottom: 20px;
    }

    .card {
      background: #1e293b;
      padding: 15px;
      margin-top: 10px;
      border-radius: 12px;
      transition: 0.2s;
    }

    .card:hover {
      transform: translateX(5px);
    }

    .card a {
      color: #60a5fa;
      text-decoration: none;
      font-size: 18px;
    }

    .card p {
      color: #cbd5e1;
      font-size: 14px;
    }

    /* LOG SYSTEM */
    .log {
      position: fixed;
      bottom: 10px;
      right: 10px;
      background: #111827;
      padding: 10px;
      font-size: 12px;
      border-radius: 8px;
      color: #94a3b8;
      max-width: 300px;
      display: none;
    }
  </style>
</head>

<body>

<!-- HOME -->
<div class="home" id="home">

  <h1 class="logo">Franc</h1>
  <p class="subtitle">Moteur de recherche de Franc Suisse</p>

  <div class="search-box">
    <input id="searchInput" type="text" placeholder="Rechercher sur Franc..." onkeypress="handleKey(event)">
    <button onclick="search()">Rechercher</button>
  </div>

  <p class="hint">Appuie sur Entrée pour lancer la recherche</p>

</div>

<!-- RESULTS -->
<div class="results" id="results">

  <div class="topbar">
    <h2>Franc Search</h2>
    <button class="backBtn" onclick="goBack()">Retour</button>
  </div>

  <div class="query" id="queryText"></div>

  <div id="resultsContainer"></div>

</div>

<!-- LOG -->
<div class="log" id="logBox"></div>

<script>
  function log(msg) {
    const box = document.getElementById("logBox");
    box.style.display = "block";
    box.innerText = "[FRANC LOG] " + msg;

    setTimeout(() => {
      box.style.display = "none";
    }, 2000);
  }

  function search() {
    const query = document.getElementById("searchInput").value;

    if (!query) {
      log("Recherche vide refusée");
      return;
    }

    log("Recherche : " + query);
    showResults(query);
  }

  function handleKey(event) {
    if (event.key === "Enter") {
      search();
    }
  }

  function showResults(query) {
    document.getElementById("home").style.display = "none";
    document.getElementById("results").style.display = "block";

    document.getElementById("queryText").innerText =
      "Résultats pour : " + query;

    const container = document.getElementById("resultsContainer");
    container.innerHTML = "";

    log("Génération des résultats...");

    const fakeResults = [
      {
        title: "Franc - " + query,
        link: "#",
        desc: "Résultat généré par le moteur Franc (prototype)."
      },
      {
        title: "Résultat web sur " + query,
        link: "#",
        desc: "Simulation d’un résultat internet."
      },
      {
        title: "Analyse de " + query,
        link: "#",
        desc: "Résultat structuré du système Franc."
      }
    ];

    fakeResults.forEach((r, i) => {
      const div = document.createElement("div");
      div.className = "card";

      div.innerHTML = `
        <a href="${r.link}">${r.title}</a>
        <p>${r.desc}</p>
      `;

      container.appendChild(div);

      log("Résultat " + (i + 1) + " chargé");
    });

    log("Recherche terminée");
  }

  function goBack() {
    log("Retour à l'accueil");
    document.getElementById("results").style.display = "none";
    document.getElementById("home").style.display = "flex";
  }
</script>

</body>
</html>
